<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Analysis Portal | SYED AL IMRAN</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        :root {
            --navy-bg: #020617; --navy-card: #0f172a; --gold: #fbbf24;
            --blue: #38bdf8; --text-dim: #94a3b8; --glass: rgba(255, 255, 255, 0.03);
            --danger: #ef4444; --header-height: 85px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--navy-bg); color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; scroll-behavior: smooth; }

        /* --- Header --- */
        header {
            height: var(--header-height); background: var(--navy-card); border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 5%;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .official-logo { 
            width: 75px; height: 75px; background: transparent; border-radius: 80px; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.1); font-size: 0.9rem;
        }
        .brand-name { font-weight: 800; color: #fff; letter-spacing: -0.5px; line-height: 1.2; }

        nav { display: flex; gap: 25px; }
        .nav-link { color: var(--text-dim); text-decoration: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link:hover, .nav-link.active { color: var(--gold); }

        main { margin-top: var(--header-height); padding: 4rem 10%; flex: 1; }

        .hero-banner { text-align: center; margin-bottom: 60px; }
        .hero-banner h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; margin-bottom: 20px; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-banner p { font-size: 1.2rem; color: var(--text-dim); max-width: 800px; margin: 0 auto; line-height: 1.6; }

        /* Mobile-friendly dynamic grids */
        .value-props { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .prop-card { background: var(--navy-card); padding: 30px; border-radius: 20px; border: 1px solid var(--glass); transition: 0.3s; }
        .prop-card i { font-size: 2rem; color: var(--gold); margin-bottom: 20px; display: block; }
        .prop-card h3 { margin-bottom: 12px; color: var(--blue); }

        .intel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .analyzer-teaser {
            margin: 40px 0; padding: 30px; background: rgba(56, 189, 248, 0.05); 
            border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 20px;
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px;
        }

        .sub-box {
            background: linear-gradient(45deg, #0f172a, #1e293b); padding: 40px; 
            border-radius: 20px; border: 1px solid var(--gold); text-align: center; margin-top: 50px;
        }

        .btn-gold { background: var(--gold); color: #000; padding: 12px 25px; border-radius: 8px; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn-gold:hover { transform: scale(1.05); background: #fff; }

        .share-row { display: flex; gap: 12px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .share-btn { color: var(--text-dim); font-size: 0.9rem; transition: 0.3s; cursor: pointer; }
        .share-btn:hover { color: var(--gold); }

        .calc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .calc-item { background: var(--navy-card); padding: 22px; border-radius: 12px; border: 1px solid var(--glass); text-decoration: none; color: var(--blue); display: flex; align-items: center; gap: 15px; transition: 0.3s; font-weight: 600; }
        .calc-item:hover { border-color: var(--gold); background: #16213e; transform: translateY(-3px); }
        .calc-item i { color: var(--gold); width: 25px; text-align: center; }

        .admin-trigger { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: var(--navy-card); border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gold); z-index: 1001; }
        .input-ui { width: 100%; padding: 12px; background: #000; border: 1px solid #334155; color: white; border-radius: 8px; margin-bottom: 15px; }

        /* Admin Management Panel Styles */
        .admin-panel { background: var(--navy-card); border: 2px solid var(--gold); border-radius: 20px; padding: 30px; margin-top: 40px; }
        .manage-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 15px; }
        .action-btns { display: flex; gap: 15px; }
        .edit-btn { color: var(--blue); cursor: pointer; background: none; border: none; font-size: 1.1rem; }
        .del-btn { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 1.1rem; }

        footer { padding: 50px 0; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; color: var(--text-dim); font-size: 0.8rem; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        /* Mobile specific media queries */
        @media (max-width: 768px) {
            header { padding: 10px 15px; flex-direction: column; height: auto; gap: 10px; }
            nav { gap: 15px; flex-wrap: wrap; justify-content: center; }
            main { margin-top: 130px; padding: 2rem 5%; }
            .hero-banner h1 { font-size: 2rem; }
            .about-grid { grid-template-columns: 1fr !important; }
            .contact-grid { grid-template-columns: 1fr !important; }
        }

        [x-cloak] { display: none !important; }
    </style>
</head>

                        <p style="line-height: 1.8; color: var(--text-dim); margin-bottom: 20px; font-size: 1.05rem; text-align: justify;">
                            I am a strategic and results-driven <strong>Chartered Accountant (CC)</strong> with over 15 years of experience specializing in Issue Management, Financial Strategy and Corporate Governance. My career is defined by a proven track record of leading <strong>20+ capital market projects</strong>, including high-profile IPOs and SME offerings.

                        <p style="line-height: 1.8; color: var(--text-dim); margin-bottom: 20px; font-size: 1.05rem; text-align: justify;">

                        </p>

                        <h4>My Vision: Engineering the Future of Finance</h4>
                        <p style="line-height: 1.8; color: var(--text-dim); margin-bottom: 20px; font-size: 1.05rem; text-align: justify;"> My vision is to modernize the capital market ecosystem by merging 15 years of rigorous regulatory expertise with custom-built financial technology. In an opaque market, I believe that transparency is not just a regulatory requirement—it is a strategic competitive advantage. By transitioning from traditional, static reporting to dynamic, digital-first decision engines, my goal is to provide institutional-grade clarity to every stakeholder, ensuring that complex valuations and BSEC compliance are accessible, accurate, and actionable.
                        </p>
                        <p style="line-height: 1.8; color: var(--text-dim); margin-bottom: 20px; font-size: 1.05rem; text-align: justify;"> I am committed to a "Compliance by Design" philosophy, where the complexities of the Income Tax Act 2024 and Public Issue Rules are integrated directly into the financial engineering process. Through the development of proprietary web-based analyzers, I aim to eliminate systemic risks and streamline the path for private entities to become public legacies. For investors and corporate leaders, this means a faster, more secure route to capital raising; for the market, it means a higher standard of data-driven accountability.
                        </p>
                        <p style="line-height: 1.8; color: var(--text-dim); margin-bottom: 20px; font-size: 1.05rem; text-align: justify;"> Beyond the numbers, I am dedicated to bridging the gap between professional finance and technical innovation. As a Chartered Accountant (CC) who leverages HTML, CSS, and Javascript, I seek to inspire a new generation of "Techno-Financiers" in Bangladesh. My mission is to prove that the future of our financial sector lies at the intersection of professional stewardship and coding proficiency, creating a landscape where technology empowers integrity and drives sustainable economic growth.
                        </p>

                        <h4 style="color: var(--blue); margin: 30px 0 15px; text-transform: uppercase; letter-spacing: 1px;">Expertise & Leadership</h4>

            <p style="font-size: 0.6rem; opacity: 0.4; margin-top: 5px;">Capital Market Strategic Portal | Version 4.0</p>
        </footer>
    </main>

    <div class="admin-trigger" @click="loginModal = true"><i class="fas fa-fingerprint"></i></div>

    <div class="modal-overlay" x-show="loginModal" x-cloak x-transition>
        <div style="background: var(--navy-card); padding: 40px; border-radius: 25px; border: 1px solid var(--gold); width: 340px; text-align: center;">
            <i class="fas fa-shield-alt" style="font-size: 2.5rem; color: var(--gold); margin-bottom: 20px;"></i>
            <h3>Admin Authorization</h3>
            <input type="password" x-model="passInput" class="input-ui" style="text-align: center; margin: 25px 0;" placeholder="******">
            <button class="btn-gold" @click="login()">VERIFY</button>
            <button @click="loginModal = false" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Dismiss</button>
        </div>
    </div>

    <script>
        function portalEngine() {
            return {
                page: 'home',
                isAuth: false,
                loginModal: false,
                passInput: '',
                editMode: false,
                form: { id: null, title: '', cat: '', link: '', img: '' },
                
                // 100% of your initial data is kept safe right here
                posts: [
                    { id: 1, title: 'Dividend Status: DSE Listed Mar-2026', cat: 'Analysis', link: 'Divident Status Mar 2026.html', img: 'Dividend.jpg' },
                    { id: 2, title: 'Debt Market Intelligence', cat: 'IPO Market', link: 'Debt Market Analisis.html', img: 'Debt Market.jpg' },
                    { id: 3, title: 'IPO Auditor Underwriter Matrix', cat: 'Lead IPO Auditor', link: 'IPO Market  with Auditor & Underwritor.html', img: 'IPO Aditor_Underwriter.jpg' },
                    { id: 4, title: 'Public Issue Rules 2025', cat: 'New Public Issue Rules', link: 'Public Issue Rules 2025.html', img: 'Public Issue 2025.jpg' },
                    { id: 5, title: 'DSE Listed Company', cat: 'Listed Company Status', link: 'DSE All Company March 26.html', img: 'DSE.webp' },
                ],
                
                scrollToIntelligence() {
                    this.page = 'home';
                    setTimeout(() => {
                        const element = document.getElementById('intel-section');
                        if (element) {
                            element.scrollIntoView({ behavior: 'smooth' });
                        }
                    }, 100);
                },
                shareLink(title, link, platform) {
                    const url = window.location.href.split('#')[0] + link;
                    const text = encodeURIComponent(`Check out this Strategic Intelligence report: ${title}`);
                    const shareUrls = {
                        linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${url}`,
                        facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
                        whatsapp: `https://api.whatsapp.com/send?text=${text}%20${url}`
                    };
                    window.open(shareUrls[platform], '_blank');
                },
                copyLink(link) {
                    navigator.clipboard.writeText(window.location.href.split('#')[0] + link);
                    alert('Report link copied to clipboard.');
                },
                login() {
                    if (this.passInput === '*****') {
                        this.isAuth = true; this.loginModal = false; this.passInput = '';
                        alert('Admin Authorized');
                    } else { alert('Access Denied'); }
                },
                
                // BRAND NEW ADMIN ACTIONS
                deletePost(id) {
                    if (confirm("Are you sure you want to delete this post?")) {
                        this.posts = this.posts.filter(post => post.id !== id);
                    }
                },
                editPost(post) {
                    this.editMode = true;
                    this.form = { ...post };
                },
                resetForm() {
                    this.editMode = false;
                    this.form = { id: null, title: '', cat: '', link: '', img: '' };
                },
                savePost() {
                    if (!this.form.title || !this.form.link) {
                        alert("Title and Link are required!");
                        return;
                    }
                    
                    if (this.editMode) {
                        // Update existing post
                        const index = this.posts.findIndex(p => p.id === this.form.id);
                        if (index !== -1) {
                            this.posts[index] = { ...this.form };
                        }
                    } else {
                        // Add new post
                        const newId = this.posts.length > 0 ? Math.max(...this.posts.map(p => p.id)) + 1 : 1;
                        this.posts.push({ ...this.form, id: newId });
                    }
                    this.resetForm();
                }
            }
        }
    </script>
</body>
